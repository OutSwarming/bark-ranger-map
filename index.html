<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening US BARK Rangers</title>
    <script>
        const firebaseAppUrl = 'https://barkrangermap-auth.web.app/';
        const localAppUrl = '01-code/app/';
        const targetUrl = window.location.hostname === 'outswarming.github.io'
            ? firebaseAppUrl
            : localAppUrl;
        window.location.replace(targetUrl + window.location.search + window.location.hash);
    </script>
</head>
<body>
    <p>Opening <a href="https://barkrangermap-auth.web.app/">US BARK Rangers</a>.</p>
</body>
</html>
